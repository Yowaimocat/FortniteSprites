      --black: #0B0E17;
      --blue: #0D1B3D;
      --white: #FFFFFF;
      --accent: #00D9FF;
      --owned: #2EFF8A;
      --missing: #FF3B5C;
      --warning: #FFD166;
      --muted: rgba(255, 255, 255, .68);
      --soft: rgba(255,255,255,.06);
      --line: rgba(0,217,255,.22);
      --line-strong: rgba(0,217,255,.72);
      --panel: rgba(13,27,61,.62);
      --shadow: 0 24px 80px rgba(0,0,0,.45);
      --radius: 26px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; background: #0B0E17; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Orbitron", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 15% -10%, rgba(0,217,255,.27), transparent 26rem),
        radial-gradient(circle at 86% 5%, rgba(0,87,185,.42), transparent 32rem),
        linear-gradient(135deg, var(--black), #071126 48%, var(--blue));
      letter-spacing: .01em;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(0,217,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,217,255,.03) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.75), transparent 70%);
    }

    header {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 18px 0;
      position: relative;
    }

    .hero {
      min-height: 0;
      padding: clamp(18px, 5vw, 42px) 12px clamp(12px, 3.2vw, 26px);
      position: relative;
      overflow: visible;
      isolation: isolate;
      text-align: center;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .hero::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 54%;
      width: min(92vw, 740px);
      height: clamp(130px, 22vw, 240px);
      background:
        radial-gradient(circle at 50% 50%, rgba(0,217,255,.22), transparent 58%),
        linear-gradient(90deg, transparent, rgba(0,217,255,.10), transparent);
      transform: translate(-50%, -50%);
      filter: blur(12px);
      z-index: -2;
      pointer-events: none;
    }

    .hero::after {
      display: none;
    }

    .hero-brand-img {
      display: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      width: min(100%, 980px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: clamp(64px, 12vw, 116px) minmax(0, 1fr) clamp(64px, 12vw, 116px);
      gap: clamp(8px, 2vw, 22px);
      align-items: center;
    }

    .hero-content::before,
    .hero-content::after {
      content: "";
      display: block;
      width: 100%;
      aspect-ratio: 1;
      background: var(--mini-cat) center / contain no-repeat;
      opacity: 1;
      filter: saturate(1.6) drop-shadow(0 0 24px rgba(0,217,255,.62));
      z-index: 1;
      pointer-events: none;
    }

    .hero-content::before { grid-column: 1; grid-row: 1; }
    .hero-content::after { grid-column: 3; grid-row: 1; }

    .hero-content h1 {
      grid-column: 2;
      grid-row: 1;
      position: relative;
      z-index: 2;
      min-width: 0;
    }

    .hero-kicker {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: clamp(.72rem, 1.55vw, .98rem);
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(0,217,255,.5);
    }

    h1 {
      margin: 0;
      text-transform: uppercase;
      line-height: .9;
      letter-spacing: .025em;
    }

    .title-sub {
      display: block;
      margin: 0 0 .28em;
      color: var(--accent);
      font-size: clamp(.62rem, 1.55vw, .98rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: .22em;
      white-space: nowrap;
      text-shadow:
        0 0 10px rgba(0,217,255,.92),
        0 0 30px rgba(0,217,255,.56),
        0 0 60px rgba(0,217,255,.24);
    }

    .title-main {
      display: block;
      color: var(--accent);
      font-size: clamp(2.15rem, 7vw, 5.7rem);
      font-weight: 900;
      letter-spacing: -.06em;
      white-space: nowrap;
      text-shadow:
        0 0 10px rgba(0,217,255,.92),
        0 0 30px rgba(0,217,255,.60),
        0 0 68px rgba(0,217,255,.28);
    }

    .hero-cta {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding-inline: 24px;
      font-size: .86rem;
      box-shadow: 0 0 34px rgba(145,70,255,.3), inset 0 0 18px rgba(255,255,255,.08);
    }

    .live-box {
      margin-top: 26px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 50px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 12px 18px;
      color: var(--white);
      text-decoration: none;
      font-weight: 900;
      text-transform: uppercase;
      background: linear-gradient(135deg, rgba(0,217,255,.2), rgba(255,255,255,.055));
      box-shadow: 0 0 26px rgba(0,217,255,.2), inset 0 0 18px rgba(0,217,255,.08);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .live-box:hover,
    .button-link:hover,
    button:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 0 26px rgba(0,217,255,.25);
    }

    .button-link.sprite-cta:hover,
    button.sprite-cta:hover {
      border-color: rgba(218,110,255,1);
      background: #7B1FFF !important;
      box-shadow: 0 0 34px rgba(155,53,255,.52), inset 0 0 18px rgba(255,255,255,.20);
    }

    .twitch-icon {
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      filter: drop-shadow(0 0 8px rgba(145,70,255,.65));
    }

    .mascot-wrap {
      position: absolute;
      z-index: 1;
      right: clamp(16px, 7vw, 92px);
      top: clamp(144px, 19vw, 190px);
      width: clamp(184px, 25.5vw, 324px);
      pointer-events: none;
    }

    .mascot-wrap::before {
      content: "";
      position: absolute;
      inset: 18% 5% 18% 2%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,217,255,.34), rgba(0,217,255,.11) 48%, transparent 70%);
      filter: blur(8px);
      z-index: -1;
    }

    .mascot-wrap img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 22px rgba(0,217,255,.33)) drop-shadow(0 32px 38px rgba(0,0,0,.58));
    }

    .bar {
      position: relative;
      z-index: 3;
      background: rgba(11,14,23,.72);
      border-block: 1px solid var(--line);
      box-shadow: 0 12px 44px rgba(0,0,0,.18);
    }

    .bar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .action-row,
    .bulk-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 14px;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr;
      width: min(100%, 760px);
      margin: 0 auto 16px;
    }

    .action-row button,
    .action-row .button-link {
      width: 100%;
      min-height: 56px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .bulk-zone {
      margin: 18px 0 18px;
    }

    button,
    .button-link {
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,.055);
      color: var(--white);
      border-radius: 999px;
      padding: 11px 16px;
      font-family: inherit;
      font-size: .82rem;
      font-weight: 900;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }

    button.primary,
    .button-link.primary {
      border-color: rgba(0,217,255,.92);
      color: #03130B;
      background: linear-gradient(135deg, #00A6FF 0%, #00D9FF 52%, #2EFF8A 100%);
      text-shadow: 0 1px 0 rgba(255,255,255,.32);
      box-shadow: 0 0 30px rgba(0,217,255,.24), inset 0 0 16px rgba(255,255,255,.16);
    }

    #copyShare.primary {
      border-color: rgba(0,217,255,.92);
      background: linear-gradient(135deg, #00A6FF 0%, #00D9FF 52%, #2EFF8A 100%);
      box-shadow: 0 0 30px rgba(0,217,255,.24), inset 0 0 16px rgba(255,255,255,.16);
    }

    button.good {
      border-color: rgba(46,255,138,.58);
    }

    button.warn {
      border-color: rgba(255,209,102,.7);
    }

    .button-link.sprite-cta,
    button.sprite-cta {
      border-color: rgba(218, 110, 255, 1);
      color: var(--white);
      background: #7B1FFF !important;
      text-shadow: 0 1px 0 rgba(0,0,0,.34);
      box-shadow: 0 0 34px rgba(155,53,255,.46), inset 0 0 18px rgba(255,255,255,.15);
    }

    .bulk-pill {
      display: inline-flex;
      align-items: stretch;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.055);
      box-shadow: 0 0 26px rgba(0,0,0,.22), inset 0 0 18px rgba(255,255,255,.04);
    }

    .bulk-pill .bulk-action {
      border: 0;
      border-radius: 0;
      min-width: 142px;
      padding-inline: 18px;
      box-shadow: none;
      background: transparent;
    }

    .bulk-pill .bulk-check {
      color: #02150A;
      background: linear-gradient(135deg, #2EFF8A, #13B95C);
      text-shadow: 0 1px 0 rgba(255,255,255,.24);
    }

    .bulk-pill .bulk-uncheck {
      color: var(--white);
      background: linear-gradient(135deg, #FF3B5C, #B91531);
      border-left: 1px solid rgba(255,255,255,.2);
      text-shadow: 0 1px 10px rgba(0,0,0,.26);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 6px 18px 54px;
    }

    const els = {
      sections: document.querySelector("#sections"),
      checkAll: document.querySelector("#checkAll"),
      uncheckAll: document.querySelector("#uncheckAll"),
      copyShare: document.querySelector("#copyShare"),
      copySharePanel: document.querySelector("#copySharePanel"),
      createSS: document.querySelector("#createSS"),
      ssBuilder: document.querySelector("#ssBuilder"),
      ssCards: document.querySelector("#ssCards"),
      ssTagButtons: document.querySelectorAll("[data-ss-tag]"),
      completeCard: document.querySelector("#completeCard"),
      ownedCount: document.querySelector("#ownedCount"),
      missingCount: document.querySelector("#missingCount"),
      totalCount: document.querySelector("#totalCount"),
      toast: document.querySelector("#toast"),
      dialog: document.querySelector("#uncheckDialog"),
      cancelUncheck: document.querySelector("#cancelUncheck"),
      continueUncheck: document.querySelector("#continueUncheck")
    };

    let owned = new Set();
    let ssTags = new Set(["Index", "Trade", "Beg"]);

    function getUrlMissingState() {
      const url = new URL(location.href);
      const hashParams = new URLSearchParams(location.hash.slice(1));
      const hasQueryMissing = url.searchParams.has("m");
      const hasHashMissing = hashParams.has("m");

      if (!hasQueryMissing && !hasHashMissing) {
        return { present: false, missing: new Set() };
      }

      const value = hasQueryMissing ? url.searchParams.get("m") : hashParams.get("m");
      const missing = new Set((value || "").split(",").map(s => s.trim()).filter(Boolean));
      return { present: true, missing };
    }

    const STORAGE_KEY = "sprite-owned-cube-pollo-default-v1";
    const DEFAULT_SS_MISSING_IDS = new Set([
      "pollo",
      "cube-grim",
      "cube-batman",
      "cube-boss",
      "cube-fishy",
      "cube-punk",
      "cube-dream",
      "cube-fire",
      "cube-earth"
    ]);

    function defaultOwnedForTradingSS() {
      return new Set(allIds.filter(id => !DEFAULT_SS_MISSING_IDS.has(id)));
    }

    function loadInitialOwned() {
      try {
        const savedRaw = localStorage.getItem(STORAGE_KEY);
        if (!savedRaw) return defaultOwnedForTradingSS();
        const saved = JSON.parse(savedRaw || "[]");
        return new Set(saved.filter(id => allIds.includes(id)));
      } catch {
        return defaultOwnedForTradingSS();
      }
    }

    function saveLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...owned]));
    }

    function getMissingIds() {
      return allIds.filter(id => !owned.has(id));
    }

    const OFFICIAL_URL = "https://fnspritetracker.com/";

    function makeShareUrl() {
      return OFFICIAL_URL;
    }

    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
      }
    }

    function escapeHtml(text) {
      return text.replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#039;",
        '"': "&quot;"
      }[char]));
    }

    function imgHtml(item, sizeClass = "thumb") {
      const initials = item.name.split(" ").map(x => x[0]).join("").slice(0,2).toUpperCase();
      return `<img class="${sizeClass}" src="${item.img}" alt="${escapeHtml(item.name)}" loading="lazy" onerror="this.outerHTML='<span class=&quot;fallback-img&quot;>${initials}</span>'">`;
    }

    function chunk(array, size) {
      const chunks = [];
      for (let i = 0; i < array.length; i += size) chunks.push(array.slice(i, i + size));
      return chunks;
    }

    function getSelectedSSTags() {
      const tags = [...ssTags];
      return tags.length ? tags : ["Index", "Trade", "Beg"];
    }

    function updateSSButtons() {
      els.ssTagButtons.forEach(button => {
        button.classList.toggle("active", ssTags.has(button.dataset.ssTag));
      });
    }

    function ssImgHtml(item) {
      const initials = item.name.split(" ").map(x => x[0]).join("").slice(0,2).toUpperCase();
      return `<img src="${item.img}" alt="${escapeHtml(item.name)}" loading="lazy" onerror="this.outerHTML='<span class=&quot;ss-fallback&quot;>${initials}</span>'">`;
    }

    function renderSSCards() {
      if (!els.ssCards) return;
      const missingItems = items.filter(item => !owned.has(item.id));
      const tradeTypes = ["Index", "Trade", "Beg"];
      const tagHtml = tradeTypes.map(tag => `<button type="button" class="ss-mode-pill ${ssTags.has(tag) ? "active" : ""}" data-ss-tag="${tag}">${escapeHtml(tag)}</button>`).join("");
      const brandChipHtml = `<span class="ss-brand-lock"><img src="${BRAND_BADGE}" alt=""><span>YOWAIMOCAT - FORTNITE SPRITE TRADING</span></span>`;

      if (!missingItems.length) {
        els.ssCards.innerHTML = `<p class="ss-empty-note">Wanna make a trading SS? Uncheck a sprite below.</p>`;
        return;
      }

      const pages = chunk(missingItems, 9);
      els.ssCards.innerHTML = pages.map((page, index) => `
        <article class="ss-card ss-count-${page.length}" aria-label="Missing Fortnite Sprites screenshot card ${index + 1} of ${pages.length}">
          <div class="ss-card-top">
            <h2 class="ss-card-title">Clear <span>Trading SS</span> <small>(Screenshot)</small></h2>
            <div class="ss-page">${index + 1}/${pages.length}</div>
          </div>
          <h3>Fortnite Sprites <span class="missing-word">(Missing)</span></h3>
          <div class="ss-modes">${tagHtml}${brandChipHtml}</div>
          <div class="ss-grid">
            ${page.map(item => `
              <button type="button" class="ss-item" data-id="${item.id}" aria-label="Mark ${escapeHtml(item.name)} as have and remove from screenshot">
                ${ssImgHtml(item)}
                <span class="ss-name">${escapeHtml(item.name)}</span>
                <span class="ss-missing">Missing</span>
              </button>
            `).join("")}
          </div>
          <div class="ss-footer">
            <span><strong>YOWAIMOCAT</strong> • Fortnite Sprite Trading • twitch.tv/yowaimocat</span>
          </div>
        </article>
      `).join("");
    }

    function render() {
      const openSections = new Set(
        [...els.sections.querySelectorAll("details.sprite-section[open]")].map(section => section.dataset.sprite)
      );

      els.sections.innerHTML = "";

      for (const sprite of SPRITES) {
        const spriteItems = items.filter(item => item.sprite === sprite.name);
        const ownedInSection = spriteItems.filter(item => owned.has(item.id)).length;
        const section = document.createElement("details");
        section.className = "sprite-section";
        section.dataset.sprite = sprite.name;
        section.open = openSections.has(sprite.name);
        section.innerHTML = `
          <summary>
            ${imgHtml(spriteItems[0])}
            <div class="section-title">
              <h2>${escapeHtml(sprite.name)} Sprites</h2>
              <p>${ownedInSection} / ${spriteItems.length} have</p>
            </div>
            <span class="chevron" aria-hidden="true">›</span>
          </summary>
          <div class="items">
            ${spriteItems.map(item => `
              <label class="item ${owned.has(item.id) ? "checked" : ""}" data-id="${item.id}">
                ${imgHtml(item)}
                <span>
                  <span class="item-name">${escapeHtml(item.name)}</span>
                  <span class="item-note">${owned.has(item.id) ? "Have" : "Missing"}</span>
                </span>
                <input type="checkbox" ${owned.has(item.id) ? "checked" : ""} aria-label="I have ${escapeHtml(item.name)}">
              </label>
            `).join("")}
          </div>
        `;
        els.sections.appendChild(section);
      }

      updateStats();
    }

    function updateStats() {
      const missingCount = items.length - owned.size;
      els.ownedCount.textContent = owned.size;
      els.missingCount.textContent = missingCount;
      els.totalCount.textContent = items.length;
      if (els.completeCard) els.completeCard.classList.toggle("show", missingCount === 0 && items.length > 0);
      renderSSCards();
    }

    function setOwned(newSet) {
      owned = new Set([...newSet].filter(id => allIds.includes(id)));
      saveLocal();
      render();
    }

    els.sections.addEventListener("change", event => {
      if (event.target.type !== "checkbox") return;
      const itemEl = event.target.closest(".item");
      const id = itemEl.dataset.id;
      if (event.target.checked) owned.add(id);
      else owned.delete(id);
      saveLocal();
      render();
    });

    els.checkAll.addEventListener("click", () => {
      setOwned(new Set(allIds));
      toast("All sprites checked");
    });

    els.uncheckAll.addEventListener("click", () => {
      if (typeof els.dialog.showModal === "function") {
        els.dialog.showModal();
      } else if (confirm("!Careful you're about to uncheck all the sprites. Continue?")) {
        setOwned(new Set());
        toast("All sprites unchecked");
      }
    });

    els.cancelUncheck.addEventListener("click", () => els.dialog.close());

    els.continueUncheck.addEventListener("click", () => {
      els.dialog.close();
      setOwned(new Set());
      toast("All sprites unchecked");
    });

    async function copyShareLink() {
      await copy(makeShareUrl());
      toast("Website link copied");
    }

    els.copyShare.addEventListener("click", copyShareLink);
    if (els.copySharePanel) els.copySharePanel.addEventListener("click", copyShareLink);

    if (els.createSS) {
      els.createSS.addEventListener("click", () => {
        renderSSCards();
        els.ssBuilder.scrollIntoView({ behavior: "smooth", block: "start" });
        toast("Trading SS ready");
      });
    }

    els.ssTagButtons.forEach(button => {
      button.addEventListener("click", () => {
        const tag = button.dataset.ssTag;
        if (ssTags.has(tag)) ssTags.delete(tag);
        else ssTags.add(tag);
        if (ssTags.size === 0) ssTags.add(tag);
        updateSSButtons();
        renderSSCards();
      });
    });

    els.ssCards.addEventListener("click", event => {
      const tagButton = event.target.closest(".ss-mode-pill[data-ss-tag]");
      if (tagButton) {
        const tag = tagButton.dataset.ssTag;
        if (ssTags.has(tag)) ssTags.delete(tag);
        else ssTags.add(tag);
        if (ssTags.size === 0) ssTags.add(tag);
        renderSSCards();
        return;
      }
      const itemButton = event.target.closest(".ss-item[data-id]");
      if (!itemButton) return;
      owned.add(itemButton.dataset.id);
      saveLocal();
      render();
      toast("Sprite removed from SS");
    });



    owned = loadInitialOwned();
    updateSSButtons();
    render();
  </script>
</body>
</html>
